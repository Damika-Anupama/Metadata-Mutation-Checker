name: CI

on:
  push:
    branches: [main, tests-ci-observability]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pypdf python-multipart python-dateutil
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Run tests
        run: pytest -q
